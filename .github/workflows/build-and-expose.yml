name: Build and expose Flask via Ngrok

on: [push]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Linting (Ruff)
        run: ruff check . --fix

      - name: Run Tests (Pytest)
        run: pytest

  ngrok:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t flask-app .

      - name: Run container (detached)
        run: docker run -d --name flask-app -p 5000:5000 flask-app

      - name: Install Ngrok
        run: sudo snap install ngrok

      - name: Start Ngrok tunnel
        env:
            NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
            nohup ngrok http 5000 &> /tmp/ngrok.log &
            for i in $(seq 1 10); do
              curl -s http://localhost:4040/api/tunnels | grep -q "public_url" && break
              sleep 2
            done

      - name: Print public URL
        run: |
          URL=$(curl -s http://localhost:4040/api/tunnels \
                | python3 -c "import sys,json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])")
          echo "======================================"
          echo "  URL PUBLIQUE : $URL"
          echo "======================================"

      - name: Stop container
        if: always()
        run: docker stop flask-app || true